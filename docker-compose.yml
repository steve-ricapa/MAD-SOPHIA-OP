name: mad-sophia-op

# One shared image for all services.
# `wazuh` builds it, others reuse it via `image`.
x-agent-common: &agent-common
  image: ${AGENT_IMAGE:-mad-sophia-op:latest}
  restart: unless-stopped
  env_file:
    - .env
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  # Builds shared image and runs Wazuh integration.
  wazuh:
    <<: *agent-common
    container_name: xoc_wazuh_agent
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AGENT_PATH: wazuh_integration/main.py
      OUTPUT_MODE: ${WAZUH_OUTPUT_MODE:-all}
      POLL_INTERVAL_ALERTS: ${WAZUH_POLL_INTERVAL_ALERTS:-60}
      POLL_INTERVAL_AGENTS: ${WAZUH_POLL_INTERVAL_AGENTS:-600}
      RETRY_FAILED_INTERVAL_SECONDS: ${WAZUH_RETRY_FAILED_INTERVAL_SECONDS:-60}
      HEARTBEAT_EMPTY_CYCLES: ${WAZUH_HEARTBEAT_EMPTY_CYCLES:-10}
      SEND_HEARTBEAT: ${WAZUH_SEND_HEARTBEAT:-false}
      MIN_RULE_LEVEL: ${WAZUH_MIN_RULE_LEVEL:-7}
      CHECKPOINT_FILE: ${WAZUH_CHECKPOINT_FILE:-state/agent_state.db}
      ARTIFACTS_DIR: ${WAZUH_ARTIFACTS_DIR:-artifacts}
      LOG_LEVEL: ${WAZUH_LOG_LEVEL:-INFO}
      HEALTH_CHECK_PORT: 8080
    ports:
      - "${WAZUH_HEALTH_HOST_PORT:-18080}:8080"

  zabbix:
    <<: *agent-common
    container_name: xoc_zabbix_agent
    depends_on:
      - wazuh
    environment:
      AGENT_PATH: zabix_integration/agent.py
      OUTPUT_MODE: ${ZABBIX_OUTPUT_MODE:-all}
      INTERVAL: ${ZABBIX_INTERVAL:-180}
      HOURS: ${ZABBIX_HOURS:-24}
      PROBLEMS_LIMIT: ${ZABBIX_PROBLEMS_LIMIT:-2000}
      TRIGGERS_LIMIT: ${ZABBIX_TRIGGERS_LIMIT:-5000}
      EVENTS_LIMIT: ${ZABBIX_EVENTS_LIMIT:-2000}
      INCLUDE_EVENTS: ${ZABBIX_INCLUDE_EVENTS:-false}

  # OpenVAS mode:
  # - real data: OPENVAS_COLLECTOR=gmp
  # - lab/demo: OPENVAS_COLLECTOR=simulated
  openvas:
    <<: *agent-common
    container_name: xoc_openvas_agent
    depends_on:
      - wazuh
    environment:
      AGENT_PATH: openVAS_integration/main.py
      OUTPUT_MODE: ${OPENVAS_OUTPUT_MODE:-http}
      COLLECTOR: ${OPENVAS_COLLECTOR:-gmp}
      POLL_SECONDS: ${OPENVAS_POLL_SECONDS:-600}
      STATE_PATH: ${OPENVAS_STATE_PATH:-./state.json}
      DETAIL_LEVEL: ${OPENVAS_DETAIL_LEVEL:-findings}

  insightvm:
    <<: *agent-common
    container_name: xoc_insightvm_agent
    depends_on:
      - wazuh
    command: >
      sh -c "python insightVM_integration/main.py --env .env --interval ${INSIGHTVM_INTERVAL_SECONDS:-600}"
    environment:
      OUTPUT_MODE: ${INSIGHTVM_OUTPUT_MODE:-all}
      STATE_FILE: ${INSIGHTVM_STATE_FILE:-state.json}
      INSIGHTVM_TIMEOUT: ${INSIGHTVM_TIMEOUT:-30}

  # Backend now supports uptimekuma scanner_type.
  uptimekuma:
    <<: *agent-common
    container_name: xoc_uptimekuma_agent
    depends_on:
      - wazuh
    environment:
      AGENT_PATH: uptimekuma_integration/agent.py
      OUTPUT_MODE: ${UPTIME_OUTPUT_MODE:-all}
      SCANNER_TYPE: ${UPTIME_SCANNER_TYPE:-uptimekuma}
      POLL_INTERVAL_SECONDS: ${UPTIME_POLL_INTERVAL_SECONDS:-120}
      FORCE_SEND_EVERY_CYCLES: ${UPTIME_FORCE_SEND_EVERY_CYCLES:-15}
      INCLUDE_ALL_MONITORS: ${UPTIME_INCLUDE_ALL_MONITORS:-false}
      INCLUDE_EXTENDED_FIELDS: ${UPTIME_INCLUDE_EXTENDED_FIELDS:-false}

  # Explicit scanner_type isolation for Nessus to avoid env collisions.
  nessus:
    <<: *agent-common
    container_name: xoc_nessus_agent
    depends_on:
      - wazuh
    environment:
      AGENT_PATH: nessus_integration/main.py
      OUTPUT_MODE: ${NESSUS_OUTPUT_MODE:-all}
      SCANNER_TYPE: ${NESSUS_SCANNER_TYPE:-nessus}
      POLL_INTERVAL_SECONDS: ${NESSUS_POLL_INTERVAL_SECONDS:-600}
      FORCE_SEND_EVERY_CYCLES: ${NESSUS_FORCE_SEND_EVERY_CYCLES:-6}
      NESSUS_MAX_SCANS_PER_CYCLE: ${NESSUS_MAX_SCANS_PER_CYCLE:-5}
